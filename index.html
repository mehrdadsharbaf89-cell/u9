    function getBrowserInfo() {
        const ua = navigator.userAgent;
        if (ua.includes("Firefox")) return "Firefox";
        else if (ua.includes("Chrome")) return "Chrome";
        else if (ua.includes("Safari")) return "Safari";
        else if (ua.includes("Edge")) return "Edge";
        else if (ua.includes("Opera")) return "Opera";
        else if (ua.includes("MSIE") || ua.includes("Trident")) return "Internet Explorer";
        return "Unknown";
    }

    function getOSInfo() {
        const ua = navigator.userAgent;
        if (ua.includes("Windows")) return "Windows";
        else if (ua.includes("Mac")) return "macOS";
        else if (ua.includes("Linux")) return "Linux";
        else if (ua.includes("Android")) return "Android";
        else if (ua.includes("iOS") || ua.includes("iPhone") || ua.includes("iPad")) return "iOS";
        return "Unknown";
    }

    function getDeviceInfo() {
        const ua = navigator.userAgent;
        if (ua.includes("Mobile")) return "Mobile";
        else if (ua.includes("Tablet")) return "Tablet";
        return "Desktop";
    }
